appId: com.sunanakgo.nais3
productName: NAIS3
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!docs/*'
  - '!tests/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!vitest.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,RESEARCH.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: NAIS3
  # Windows는 둥근 모서리·여백 규칙이 없어 mac용(여백 큼) 대신 여백 최소 버전 사용
  icon: build/icon-win.png
  target:
    - nsis # exe 설치본만 (msi 없음)
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  # 원클릭 대신 어시스트 설치 — 설치 경로 선택 가능
  oneClick: false
  allowToChangeInstallationDirectory: true
  # 차등 업데이트: .blockmap 파일 1개 추가되는 대신 업데이트 시 변경 블록만 다운로드 (훨씬 빠름)
mac:
  # macOS 표준 여백(박스 ~80%) 버전
  icon: build/icon.png
  # zip에 아키텍처 명시 (기본값은 x64에서 arch 생략 → 업데이터가 못 찾음). dmg는 아래 dmg.artifactName이 우선
  artifactName: ${name}-${version}-${arch}-mac.${ext}
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    # zip: 커스텀 mac 자동 업데이트용 (앱이 zip을 받아 .app 교체 — Tauri 방식, Apple 서명 불필요)
    - target: zip
      arch:
        - arm64
        - x64
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
  writeUpdateInfo: false # dmg는 수동 설치용 — 업데이트 정보 미생성
npmRebuild: false
publish:
  provider: github
  owner: sunanakgo
  repo: NAIS3
